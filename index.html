<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Aesthetics Program</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #161616;
    --border: #222222;
    --accent: #c8f542;
    --accent2: #42d4f5;
    --text: #f0f0f0;
    --muted: #666;
    --push: #ff6b35;
    --pull: #42d4f5;
    --legs: #c8f542;
    --upper: #b06aff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* INSTALL BANNER */
  #install-banner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    z-index: 100;
    align-items: center;
    gap: 14px;
    animation: slideUp 0.3s ease;
  }

  #install-banner.visible { display: flex; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .install-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #0a0a0a;
  }

  .install-text {
    flex: 1;
  }

  .install-text strong {
    display: block;
    font-size: 14px;
    color: var(--text);
  }

  .install-text span {
    font-size: 12px;
    color: var(--muted);
  }

  .install-btn {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  /* iOS install tip */
  #ios-tip {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    z-index: 100;
    text-align: center;
    animation: slideUp 0.3s ease;
  }

  #ios-tip.visible { display: block; }

  #ios-tip p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  #ios-tip strong { color: var(--text); }

  #ios-tip .share-icon {
    display: inline-block;
    width: 18px; height: 18px;
    background: var(--accent2);
    border-radius: 3px;
    vertical-align: middle;
    position: relative;
    top: -1px;
    margin: 0 3px;
  }

  #ios-tip button {
    margin-top: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }

  /* HEADER */
  header {
    padding: 52px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    padding-top: calc(52px + env(safe-area-inset-top));
  }

  header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(200,245,66,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 14vw, 84px);
    line-height: 0.9;
    letter-spacing: 0.02em;
  }

  h1 span { color: var(--accent); }

  .header-meta {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .meta-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* PRIORITIES */
  .priorities {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .priority-badge {
    padding: 5px 12px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    border: 1px solid;
  }

  .badge-shoulders { color: var(--push); border-color: var(--push); background: rgba(255,107,53,0.08); }
  .badge-back { color: var(--pull); border-color: var(--pull); background: rgba(66,212,245,0.08); }
  .badge-chest { color: var(--upper); border-color: var(--upper); background: rgba(176,106,255,0.08); }

  /* MAIN */
  main { padding: 20px 24px; display: grid; gap: 16px; }

  /* DAY CARD */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-header {
    display: flex;

<script>
  function toggle(id) {
    document.getElementById(id).classList.toggle('open');
  }

  // PWA: Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // PWA: Install prompt (Android/Chrome)
  let deferredPrompt;
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const dismissBtn = document.getElementById('install-dismiss');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem('install-dismissed')) {
      setTimeout(() => banner.classList.add('visible'), 1500);
    }
  });

  installBtn.addEventListener('click', async () => {
    banner.classList.remove('visible');
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  });

  dismissBtn.addEventListener('click', () => {
    banner.classList.remove('visible');
    localStorage.setItem('install-dismissed', '1');
  });

  // iOS install tip
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isInStandalone = window.navigator.standalone;
  const iosTip = document.getElementById('ios-tip');
  const iosDismiss = document.getElementById('ios-dismiss');

  if (isIOS && !isInStandalone && !localStorage.getItem('ios-tip-dismissed')) {
    setTimeout(() => iosTip.classList.add('visible'), 2000);
  }

  iosDismiss.addEventListener('click', () => {
    iosTip.classList.remove('visible');
    localStorage.setItem('ios-tip-dismissed', '1');
  });
</script>
